name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Ruff and Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: purchasing_agent_test
          MYSQL_USER: purchasing_agent
          MYSQL_PASSWORD: test-password
          MYSQL_ROOT_PASSWORD: root-test-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot-test-password"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    env:
      TEST_DATABASE_URL: mysql+asyncmy://purchasing_agent:test-password@127.0.0.1:3306/purchasing_agent_test?charset=utf8mb4
      TEST_REDIS_URL: redis://127.0.0.1:6379/15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Pytest
        run: python -m pytest -q

      - name: Verify Alembic head
        run: python -m alembic heads
